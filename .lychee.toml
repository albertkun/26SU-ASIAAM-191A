# lychee link-checker configuration
# https://lychee.cli.rs/usage/config/

# Skip these URLs — CDNs, known-good external resources, and intentional placeholders
exclude = [
  # CDN scripts — always up, no need to hammer them
  "https?://unpkg\\.com",
  "https?://code\\.iconify\\.design",
  "https?://api\\.maptiler\\.com",
  # Intentional example placeholder used in code-block demos
  "https?://www\\.example\\.com",
  # GitHub edit links generated by Starlight — checked separately by GitHub
  "https://github\\.com/.*/edit/",
  # Discord invites are ephemeral
  "https://discord\\.gg",
]

# Treat these HTTP status codes as valid (some hosts return 403/429 for bots)
accept = ["100..=103", "200..=299", "429"]

# Network settings
timeout = 20          # seconds per request
max_retries = 3
retry_wait_time = 5

# Skip mailto: links
exclude_mail = true

# Use GITHUB_TOKEN for github.com links to avoid rate-limiting
